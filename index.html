<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 방명록 📝</title>
    <meta name="description" content="우리반 학생들이 자유롭게 글을 남길 수 있는 방명록입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-glow"></div>
            <div class="header-content">
                <div class="header-icon">📝</div>
                <h1 class="header-title">우리반 방명록</h1>
                <p class="header-subtitle">자유롭게 마음을 남겨주세요 ✨</p>
                <div class="stats-bar" id="statsBar">
                    <div class="stat-item">
                        <span class="stat-icon">💌</span>
                        <span class="stat-label">전체 글</span>
                        <span class="stat-value" id="totalCount">0</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-icon">📅</span>
                        <span class="stat-label">오늘</span>
                        <span class="stat-value" id="todayCount">0</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-icon">👥</span>
                        <span class="stat-label">참여자</span>
                        <span class="stat-value" id="authorCount">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Write Form -->
        <section class="write-section" id="writeSection">
            <div class="write-card">
                <div class="write-card-header">
                    <span class="write-icon">✏️</span>
                    <span class="write-title">글 남기기</span>
                </div>
                <form id="guestbookForm" class="write-form">
                    <div class="form-row">
                        <div class="input-group" id="nameGroup">
                            <label for="nameInput" class="input-label">이름</label>
                            <div class="input-wrapper">
                                <span class="input-icon">😊</span>
                                <input 
                                    type="text" 
                                    id="nameInput" 
                                    placeholder="이름을 입력하세요" 
                                    maxlength="20" 
                                    required
                                    autocomplete="off"
                                >
                                <span class="char-count" id="nameCharCount">0/20</span>
                            </div>
                        </div>
                    </div>

                    <div class="mood-selector">
                        <label class="input-label">기분</label>
                        <div class="mood-options" id="moodOptions">
                            <button type="button" class="mood-btn" data-mood="😊" title="기분 좋음">😊</button>
                            <button type="button" class="mood-btn" data-mood="😎" title="쿨함">😎</button>
                            <button type="button" class="mood-btn" data-mood="🥰" title="사랑">🥰</button>
                            <button type="button" class="mood-btn" data-mood="😂" title="웃김">😂</button>
                            <button type="button" class="mood-btn" data-mood="🤔" title="생각 중">🤔</button>
                            <button type="button" class="mood-btn" data-mood="😴" title="졸림">😴</button>
                            <button type="button" class="mood-btn" data-mood="🔥" title="열정">🔥</button>
                            <button type="button" class="mood-btn" data-mood="🌈" title="행복">🌈</button>
                            <button type="button" class="mood-btn" data-mood="⭐" title="최고">⭐</button>
                            <button type="button" class="mood-btn" data-mood="💪" title="화이팅">💪</button>
                        </div>
                    </div>

                    <div class="input-group" id="messageGroup">
                        <label for="messageInput" class="input-label">메시지</label>
                        <div class="textarea-wrapper">
                            <textarea 
                                id="messageInput" 
                                placeholder="하고 싶은 말을 자유롭게 적어주세요..."
                                maxlength="500"
                                rows="4"
                                required
                            ></textarea>
                            <span class="char-count" id="msgCharCount">0/500</span>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">글 남기기</span>
                        <span class="btn-icon">🚀</span>
                        <div class="btn-ripple"></div>
                    </button>
                </form>
            </div>
        </section>

        <!-- Filter & Search -->
        <section class="filter-section" id="filterSection">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="글 검색하기..."
                    autocomplete="off"
                >
                <button class="search-clear" id="searchClear" title="검색 초기화">✕</button>
            </div>
            <div class="sort-options">
                <button class="sort-btn active" data-sort="newest" id="sortNewest">최신순</button>
                <button class="sort-btn" data-sort="oldest" id="sortOldest">오래된순</button>
            </div>
        </section>

        <!-- Messages List -->
        <section class="messages-section" id="messagesSection">
            <div class="messages-list" id="messagesList">
                <!-- Messages will be dynamically inserted here -->
            </div>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📭</div>
                <h3 class="empty-title">아직 글이 없어요</h3>
                <p class="empty-text">첫 번째 글을 남겨보세요!</p>
            </div>
            <div class="no-results" id="noResults" style="display:none;">
                <div class="empty-icon">🔍</div>
                <h3 class="empty-title">검색 결과가 없어요</h3>
                <p class="empty-text">다른 키워드로 검색해보세요</p>
            </div>
        </section>

        <!-- Scroll to top -->
        <button class="scroll-top-btn" id="scrollTopBtn" title="맨 위로">
            <span>↑</span>
        </button>

        <!-- Toast notification -->
        <div class="toast" id="toast">
            <span class="toast-icon" id="toastIcon">✅</span>
            <span class="toast-message" id="toastMessage">글이 등록되었습니다!</span>
        </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-card">
            <div class="modal-icon">🗑️</div>
            <h3 class="modal-title">글을 삭제할까요?</h3>
            <p class="modal-text">삭제된 글은 복구할 수 없어요.</p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="modalCancel">취소</button>
                <button class="modal-btn modal-confirm" id="modalConfirm">삭제</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
